<body class="flex flex-col min-h-screen items-center overflow-x-hidden">

<div class="flex items-center gap-2">

<h1 class="font-headline-md text-[20px] font-bold text-primary">할래말래</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-[#ECE3D8]" data-icon="bookmark">bookmark</span>
</div>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-container_max_width mx-auto flex-1 flex flex-col items-center px-edge_margin py-section_padding text-center">
<!-- Empathy Hero Section -->

<div class="w-24 h-24 mb-6 relative">

</div>
</div>
<h2 class="font-headline-md text-headline-md text-hygge-warm">오늘은 좀 많이 지치셨나 봐요</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[280px] leading-relaxed">

            </p>
</div>
<!-- Atmospheric Visual Spacer -->
<div class="w-full h-48 rounded-3xl overflow-hidden relative mb-stack_gap_lg">

<div class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent"></div>
</div>
<!-- Expert Support Card -->
<section class="w-full mt-auto mb-stack_gap_lg">
<div class="bg-surface-container-lowest rounded-[16px] p-6 safe-shadow border border-hygge-border flex flex-col items-center gap-stack_gap_md">
<div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-xl">favorite</span>
</div>
<p class="font-label-md text-on-surface-variant text-center px-4">
                    도움이 필요하다면 전문가와 대화해보세요
                </p>
<button class="w-full bg-[#FFFFFF] border-[1.5px] border-hygge-border text-hygge-warm py-3 rounded-[12px] font-label-md hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
                    도움받을 수 있는 곳 보기
                </button>
</div>
</section>
<!-- Low Stakes Encouragement -->
<div class="mb-section_padding">
<p class="text-[13px] text-on-surface-variant opacity-60 font-body-sm italic">
                나중에 마음이 조금 더 편안해졌을 때, 다시 만나요.
            </p>
</div>
</main>
<!-- Navigation Suppressed as per Task Requirements -->
<script>
        // Subtle floating interaction for the cloud icon
        const cloud = document.querySelector('.material-symbols-outlined.text-5xl');
        if (cloud) {
            let angle = 0;
            function animate() {
                angle += 0.02;
                const y = Math.sin(angle) * 8;
                cloud.parentElement.style.transform = `translateY(${y}px)`;
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
