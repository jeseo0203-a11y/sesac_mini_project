<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-primary": "#ffffff",
                "text-muted": "#A6A1B8",
                "surface-container-highest": "#e7defe",
                "tertiary": "#00554b",
                "outline": "#787585",
                "on-surface-variant": "#474554",
                "on-primary-fixed-variant": "#3e2fb2",
                "on-primary-container": "#e0dbff",
                "surface-container-lowest": "#ffffff",
                "surface-bright": "#fdf7ff",
                "outline-variant": "#c8c4d6",
                "secondary": "#ae3115",
                "tertiary-fixed": "#71f8e4",
                "tertiary-container": "#006f64",
                "tertiary-fixed-dim": "#4fdbc8",
                "on-tertiary-fixed": "#00201c",
                "on-surface": "#1d182f",
                "on-secondary-container": "#640f00",
                "on-tertiary-container": "#6df4e1",
                "surface-dim": "#dfd5f5",
                "primary-fixed-dim": "#c5c0ff",
                "on-secondary": "#ffffff",
                "surface-container": "#f2ebff",
                "secondary-fixed-dim": "#ffb4a3",
                "inverse-on-surface": "#f5eeff",
                "text-secondary": "#6B6580",
                "on-primary-fixed": "#140067",
                "skeleton": "#F0EDF9",
                "border": "#EAE6F5",
                "selection-bg": "#F0EDFF",
                "secondary-container": "#fd6a49",
                "primary": "#4234b6",
                "on-error-container": "#93000a",
                "surface-container-high": "#ede4ff",
                "on-background": "#1d182f",
                "surface-variant": "#e7defe",
                "inverse-surface": "#322d45",
                "inverse-primary": "#c5c0ff",
                "primary-container": "#5b4fcf",
                "surface-container-low": "#f8f1ff",
                "on-tertiary-fixed-variant": "#005048",
                "on-secondary-fixed": "#3d0600",
                "error": "#ba1a1a",
                "on-error": "#ffffff",
                "on-tertiary": "#ffffff",
                "error-container": "#ffdad6",
                "on-secondary-fixed-variant": "#8c1900",
                "surface": "#FFFFFF",
                "primary-fixed": "#e4dfff",
                "background": "#FBF9FF",
                "surface-tint": "#574acb",
                "secondary-fixed": "#ffdad2"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "header-height": "56px",
                "screen-padding": "20px",
                "base": "8px",
                "vertical-gap": "16px"
            },
            "fontFamily": {
                "headline-h2": ["Plus Jakarta Sans"],
                "body-md": ["Plus Jakarta Sans"],
                "headline-h1": ["Plus Jakarta Sans"],
                "label-button": ["Plus Jakarta Sans"],
                "caption": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                "headline-h2": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "headline-h1": ["22px", {"lineHeight": "1.4", "fontWeight": "600"}],
                "label-button": ["16px", {"lineHeight": "1.0", "fontWeight": "600"}],
                "caption": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #FBF9FF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .selection-card-transition {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .active-selection {
            border-width: 2px !important;
            border-color: #4234b6 !important;
            background-color: #F0EDFF !important;
            transform: scale(1.02);
        }
        .progress-bar-fill {
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-on-background overflow-x-hidden">
<!-- Top Navigation Shell (Shared Component Mapping) -->
<header class="fixed top-0 left-0 w-full z-50 px-screen-padding flex items-center justify-between h-[56px] bg-background">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[28px]">arrow_back</span>
</button>
<h1 class="font-headline-h1 text-headline-h1 text-primary">HobbyDNA</h1>
</div>
<div class="font-label-button text-text-muted">
<span class="text-primary">5</span>/9
        </div>
</header>
<!-- Progress Indicator -->
<div class="fixed top-[56px] left-0 w-full h-1 bg-skeleton z-50">
<div class="h-full bg-primary progress-bar-fill" style="width: 55.5%"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[88px] px-screen-padding pb-32 max-w-2xl mx-auto w-full">
<!-- Category & Headline -->
<div class="mb-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<span class="inline-block px-3 py-1 rounded-full bg-surface-container-high text-on-primary-fixed-variant font-caption text-caption mb-3">
                핵심 프로필
            </span>
<h2 class="font-headline-h1 text-headline-h1 text-on-surface leading-snug">
                한 달에 이 정도까지는<br/>써볼 수 있어요
            </h2>
<p class="font-body-md text-body-md text-text-secondary mt-2">
                나에게 딱 맞는 가성비 취미를 찾아드려요.
            </p>
</div>
<!-- Selection Container (Bento-lite Layout) -->
<div class="grid grid-cols-1 gap-vertical-gap">
<!-- Option 1 -->
<button class="selection-card-transition group relative flex items-center justify-between p-5 h-[72px] bg-surface border border-border rounded-xl hover:border-primary/50 text-left" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">savings</span>
</div>
<span class="font-label-button text-label-button text-on-surface">0원 — 무료로만</span>
</div>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</button>
<!-- Option 2 -->
<button class="selection-card-transition group relative flex items-center justify-between p-5 h-[72px] bg-surface border border-border rounded-xl hover:border-primary/50 text-left" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="font-label-button text-label-button text-on-surface">1만원대</span>
</div>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</button>
<!-- Option 3 -->
<button class="selection-card-transition group relative flex items-center justify-between p-5 h-[72px] bg-surface border border-border rounded-xl hover:border-primary/50 text-left" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">wallet</span>
</div>
<span class="font-label-button text-label-button text-on-surface">3~5만원</span>
</div>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</button>
<!-- Option 4 -->
<button class="selection-card-transition group relative flex items-center justify-between p-5 h-[72px] bg-surface border border-border rounded-xl hover:border-primary/50 text-left" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">diamond</span>
</div>
<span class="font-label-button text-label-button text-on-surface">10만원 이상</span>
</div>
<div class="radio-indicator w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 transition-opacity"></div>
</div>
</button>
</div>
<!-- Atmospheric Visual Element -->
<div class="mt-12 relative h-48 rounded-2xl overflow-hidden shadow-sm">

<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute bottom-4 left-4 right-4 flex items-center gap-3">
<div class="w-12 h-12 rounded-xl bg-white/80 backdrop-blur-md flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-secondary">analytics</span>
</div>
<div>
<p class="font-caption text-caption text-on-surface font-semibold">Smart Match</p>
<p class="text-[11px] text-text-secondary">예산에 맞춘 큐레이션 진행 중</p>
</div>
</div>
</div>
</main>
<!-- Fixed Bottom CTA (Primary CTA Style) -->
<footer class="fixed bottom-0 left-0 w-full p-screen-padding bg-gradient-to-t from-background via-background to-transparent pt-8 pb-6 z-50">
<button class="w-full h-[52px] bg-secondary-container text-on-secondary-container font-label-button text-label-button rounded-xl shadow-lg shadow-secondary/20 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform opacity-50 cursor-not-allowed" disabled="" id="nextBtn">
            다음
            <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</footer>
<script>
        function selectOption(element) {
            // Remove active classes from all siblings
            const allOptions = document.querySelectorAll('.selection-card-transition');
            allOptions.forEach(opt => {
                opt.classList.remove('active-selection');
                opt.querySelector('.radio-indicator').classList.replace('border-primary', 'border-outline-variant');
                opt.querySelector('.radio-indicator div').classList.add('opacity-0');
            });

            // Add active classes to selected
            element.classList.add('active-selection');
            const indicator = element.querySelector('.radio-indicator');
            indicator.classList.replace('border-outline-variant', 'border-primary');
            indicator.querySelector('div').classList.remove('opacity-0');

            // Enable CTA
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('bg-secondary-container', 'text-on-secondary-container'); // Correcting back to Brand CTA
            // Switch to Coral for Primary CTA per style guide
            nextBtn.style.backgroundColor = '#fd6a49'; // Secondary Container / Coral
            nextBtn.style.color = '#ffffff'; 
            nextBtn.disabled = false;

            // Micro-interaction
            element.animate([
                { transform: 'scale(1)' },
                { transform: 'scale(1.02)' },
                { transform: 'scale(1)' }
            ], {
                duration: 200,
                easing: 'ease-out'
            });
        }
    </script>
</body></html>
