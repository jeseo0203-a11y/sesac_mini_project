<html lang="ko"><head>

            "fontFamily": {

          },
        },
      }

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .selection-card-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-bar-fill {
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full z-50 px-screen-padding flex items-center justify-between h-[56px] bg-background">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-start text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[28px]">arrow_back</span>
</button>
<h1 class="font-headline-h1 text-headline-h1 text-primary">HobbyDNA</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Progress Indicator -->
<div class="fixed top-[56px] left-0 w-full h-1 bg-skeleton z-50">
<div class="progress-bar-fill h-full bg-primary w-[22.2%]"></div>
</div>
<!-- Main Content Area -->
<main class="flex-1 mt-[72px] px-screen-padding pb-32">
<!-- Category & Progress Text -->
<div class="mb-4">
<span class="inline-block px-3 py-1 rounded-full bg-surface-container text-primary font-caption text-caption mb-2">핵심 프로필</span>
<p class="text-text-muted font-caption text-caption">질문 2 / 9</p>
</div>
<!-- Question Header -->
<h2 class="font-headline-h1 text-headline-h1 mb-8 tracking-tight">
            혼자가 편할까요,<br/>함께가 좋을까요?
        </h2>
<!-- Visual Anchor (Atmospheric Element) -->
<div class="relative w-full aspect-video rounded-3xl overflow-hidden mb-8 shadow-sm">
<div class="w-full h-full bg-cover bg-center" data-alt="A modern, abstract digital illustration showing a balance between solitude and connection. One side features a peaceful solo figure reading in a soft, violet-lit room, while the other side shows a vibrant group of friends laughing together in a warm, coral-toned garden. The aesthetic is clean, corporate-modern, and optimistic, using smooth gradients and soft lighting to create a welcoming atmosphere." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDtEImbKQsf2RpACkN-3pfv5Q1-QbGJF-ciVccxb0P5Kzwx1Rt8m3ewvV_t-DN8-GWbiUjqeMmFB9LMXNw2koIiR20WfXsidneEbLIDB1_5gziFS27iJ2Vq6IPIfO9I6SI4YjlQzJNPK6rz2lIlsQ4aCRoSHcREDm1x1TYK1XJLuB9ng1fM_ipobjPLDdNr2EFFsk5c608XEERHX27taTlhb6oxltfITSO9wDk3sL6VlwjNQm1d1vPPC-qWE-_PprIPjFbmBtPT1fbT')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Selection List (5-point scale) -->
<div class="flex flex-col gap-4" id="selection-group">
<!-- Option 1 -->
<button class="selection-card-transition w-full h-[64px] px-6 flex items-center justify-between bg-surface border border-border rounded-[18px] text-left hover:border-primary/30 group" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface group-active:translate-x-1 transition-transform">완전 혼자가 좋아요</span>
<span class="material-symbols-outlined text-border group-[.selected]:text-primary transition-colors">check_circle</span>
</button>
<!-- Option 2 -->
<button class="selection-card-transition w-full h-[64px] px-6 flex items-center justify-between bg-surface border border-border rounded-[18px] text-left hover:border-primary/30 group" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface group-active:translate-x-1 transition-transform">혼자가 편해요</span>
<span class="material-symbols-outlined text-border group-[.selected]:text-primary transition-colors">check_circle</span>
</button>
<!-- Option 3 -->
<button class="selection-card-transition w-full h-[64px] px-6 flex items-center justify-between bg-surface border border-border rounded-[18px] text-left hover:border-primary/30 group" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface group-active:translate-x-1 transition-transform">둘 다 괜찮아요</span>
<span class="material-symbols-outlined text-border group-[.selected]:text-primary transition-colors">check_circle</span>
</button>
<!-- Option 4 -->
<button class="selection-card-transition w-full h-[64px] px-6 flex items-center justify-between bg-surface border border-border rounded-[18px] text-left hover:border-primary/30 group" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface group-active:translate-x-1 transition-transform">함께가 좋아요</span>
<span class="material-symbols-outlined text-border group-[.selected]:text-primary transition-colors">check_circle</span>
</button>
<!-- Option 5 -->
<button class="selection-card-transition w-full h-[64px] px-6 flex items-center justify-between bg-surface border border-border rounded-[18px] text-left hover:border-primary/30 group" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface group-active:translate-x-1 transition-transform">사람들과 왁자지껄이 좋아요</span>
<span class="material-symbols-outlined text-border group-[.selected]:text-primary transition-colors">check_circle</span>
</button>
</div>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 w-full p-screen-padding bg-gradient-to-t from-background via-background to-transparent pt-8 z-40">
<button class="w-full h-[56px] bg-secondary-container text-on-primary font-label-button text-label-button rounded-[16px] shadow-lg shadow-secondary-container/20 opacity-50 cursor-not-allowed active:scale-95 transition-all flex items-center justify-center gap-2" disabled="" id="next-button">
            다음
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<script>
        function selectOption(element) {
            // Remove selection from all options
            const options = document.querySelectorAll('#selection-group button');
            options.forEach(opt => {
                opt.classList.remove('selected', 'border-primary', 'bg-selection-bg', 'shadow-sm');
                opt.classList.add('border-border', 'bg-surface');
                // Target the icon
                const icon = opt.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            });

            // Apply selection to clicked element
            element.classList.add('selected', 'border-primary', 'bg-selection-bg', 'shadow-sm');
            element.classList.remove('border-border', 'bg-surface');
            
            const activeIcon = element.querySelector('.material-symbols-outlined');
            activeIcon.style.fontVariationSettings = "'FILL' 1";

            // Enable Next button
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('opacity-100', 'cursor-pointer');
            
            // Subtle haptic feedback feel
            element.style.transform = 'scale(0.98)';
            setTimeout(() => {
                element.style.transform = 'scale(1)';
            }, 100);
        }

        // Initialize progress bar width on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const bar = document.querySelector('.progress-bar-fill');
                bar.style.width = '22.22%'; // 2 out of 9
            }, 300);
        });
    </script>
</body></html>
