<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .selection-card-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-bar-fill {
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary": "#ffffff",
                      "text-muted": "#A6A1B8",
                      "surface-container-highest": "#e7defe",
                      "tertiary": "#00554b",
                      "outline": "#787585",
                      "on-surface-variant": "#474554",
                      "on-primary-fixed-variant": "#3e2fb2",
                      "on-primary-container": "#e0dbff",
                      "surface-container-lowest": "#ffffff",
                      "surface-bright": "#fdf7ff",
                      "outline-variant": "#c8c4d6",
                      "secondary": "#ae3115",
                      "tertiary-fixed": "#71f8e4",
                      "tertiary-container": "#006f64",
                      "tertiary-fixed-dim": "#4fdbc8",
                      "on-tertiary-fixed": "#00201c",
                      "on-surface": "#1d182f",
                      "on-secondary-container": "#640f00",
                      "on-tertiary-container": "#6df4e1",
                      "surface-dim": "#dfd5f5",
                      "primary-fixed-dim": "#c5c0ff",
                      "on-secondary": "#ffffff",
                      "surface-container": "#f2ebff",
                      "secondary-fixed-dim": "#ffb4a3",
                      "inverse-on-surface": "#f5eeff",
                      "text-secondary": "#6B6580",
                      "on-primary-fixed": "#140067",
                      "skeleton": "#F0EDF9",
                      "border": "#EAE6F5",
                      "selection-bg": "#F0EDFF",
                      "secondary-container": "#fd6a49",
                      "primary": "#4234b6",
                      "on-error-container": "#93000a",
                      "surface-container-high": "#ede4ff",
                      "on-background": "#1d182f",
                      "surface-variant": "#e7defe",
                      "inverse-surface": "#322d45",
                      "inverse-primary": "#c5c0ff",
                      "primary-container": "#5b4fcf",
                      "surface-container-low": "#f8f1ff",
                      "on-tertiary-fixed-variant": "#005048",
                      "on-secondary-fixed": "#3d0600",
                      "error": "#ba1a1a",
                      "on-error": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "error-container": "#ffdad6",
                      "on-secondary-fixed-variant": "#8c1900",
                      "surface": "#FFFFFF",
                      "primary-fixed": "#e4dfff",
                      "background": "#FBF9FF",
                      "surface-tint": "#574acb",
                      "secondary-fixed": "#ffdad2"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "header-height": "56px",
                      "screen-padding": "20px",
                      "base": "8px",
                      "vertical-gap": "16px"
              },
              "fontFamily": {
                      "headline-h2": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "headline-h1": ["Plus Jakarta Sans"],
                      "label-button": ["Plus Jakarta Sans"],
                      "caption": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-h2": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                      "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-h1": ["22px", {"lineHeight": "1.4", "fontWeight": "600"}],
                      "label-button": ["16px", {"lineHeight": "1.0", "fontWeight": "600"}],
                      "caption": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 px-screen-padding flex items-center justify-between h-[56px] bg-background">
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-h1 text-headline-h1 text-primary">HobbyDNA</h1>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<!-- Progress Indicator -->
<div class="fixed top-[56px] left-0 w-full z-40 bg-background/80 backdrop-blur-sm">
<div class="w-full h-1 bg-skeleton overflow-hidden">
<div class="progress-bar-fill h-full bg-primary" style="width: 77.7%"></div>
</div>
<div class="px-screen-padding py-3 flex justify-between items-center">
<span class="font-caption text-caption text-text-muted">7 / 9 Questions</span>
<span class="font-label-button text-[12px] px-3 py-1 bg-primary/10 text-primary rounded-full">취향 보강</span>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-screen-padding pt-[112px] pb-[100px] flex flex-col">
<!-- Animated Background Element (Atmospheric) -->
<div class="relative w-full mb-10 overflow-hidden rounded-3xl h-48 bg-surface-container shadow-sm border border-border">

<div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-10">
<span class="font-headline-h1 text-headline-h1 text-on-surface mb-2">끝났을 때 뭐가 남으면<br/>뿌듯할까요?</span>
<p class="font-caption text-caption text-text-secondary opacity-80">당신의 성취감이 향하는 곳을 알려주세요.</p>
</div>
</div>
<!-- Selection Cards (Options) -->
<div class="flex flex-col gap-vertical-gap">
<!-- Option 1 -->
<button class="selection-card-transition group w-full min-h-[72px] bg-surface border border-border rounded-xl px-6 py-4 flex items-center justify-between text-left hover:border-primary/50 focus:outline-none" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<span class="text-2xl">🖼</span>
<span class="font-label-button text-label-button text-on-surface">눈에 보이는 결과물</span>
</div>
<div class="selection-check opacity-0 transform scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2 -->
<button class="selection-card-transition group w-full min-h-[72px] bg-surface border border-border rounded-xl px-6 py-4 flex items-center justify-between text-left hover:border-primary/50 focus:outline-none" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<span class="text-2xl">📓</span>
<span class="font-label-button text-label-button text-on-surface">기록이 쌓이는 과정</span>
</div>
<div class="selection-check opacity-0 transform scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="selection-card-transition group w-full min-h-[72px] bg-surface border border-border rounded-xl px-6 py-4 flex items-center justify-between text-left hover:border-primary/50 focus:outline-none" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<span class="text-2xl">✅</span>
<span class="font-label-button text-label-button text-on-surface">그날그날 끝나는 후련함</span>
</div>
<div class="selection-check opacity-0 transform scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 4 -->
<button class="selection-card-transition group w-full min-h-[72px] bg-surface border border-border rounded-xl px-6 py-4 flex items-center justify-between text-left hover:border-primary/50 focus:outline-none" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<span class="text-2xl">💪</span>
<span class="font-label-button text-label-button text-on-surface">실력이 느는 성장 그 자체</span>
</div>
<div class="selection-check opacity-0 transform scale-50 transition-all duration-300">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Descriptive Visual Component -->
<div class="mt-8 p-4 rounded-2xl bg-surface-container-low border border-border flex items-center gap-4">
<div class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 bg-primary/5">
<img class="w-full h-full object-cover" data-alt="A soft, aesthetically pleasing close-up of a person's hands holding a vibrant violet seedling, representing personal growth and the nurturing of a new hobby. The background is a soft, warm cream color with dappled sunlight. The style is minimalist and high-end consumer photography, emphasizing textures and clean lines in a modern light-mode palette." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFrAg7fSLGzDMoQmmGGWJLioVlL6S6eDGG-X3wF-0v3nnhYg2RT0whfx9jUUovMOAy8XCSIiS0YobZW_wUf99QysCAOPcIScuAMTVFcJQUvTnr7VH25Pi7MMdQjB0ZN1ve3dRejLq6M913yfEXWydZaZFIcbXJPh05HVHJ8ddvgjCDcsJKfL63iC0UIGTFf2YVdiYjFZtsE9ALl1g3KKdVnd9bqc46yvswLGPPspZoU23UJuFee3wJMsp6i_AlQcv3s-68TYqRaYNA"/>
</div>
<div>
<p class="font-body-md text-body-md text-on-surface-variant leading-snug">
                    당신의 취향은 더 선명해지고 있습니다.<br/>
<span class="text-primary font-bold">DNA 분석률 82%</span>
</p>
</div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<footer class="fixed bottom-0 left-0 w-full p-screen-padding bg-background/80 backdrop-blur-lg border-t border-border z-50">
<button class="w-full h-[52px] bg-secondary opacity-50 cursor-not-allowed text-on-primary font-label-button text-label-button rounded-xl shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" disabled="" id="next-button">
            다음
            <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
</footer>
<script>
        let selectedElement = null;

        function selectOption(el) {
            // Remove previous selection styles
            if (selectedElement) {
                selectedElement.classList.remove('border-primary', 'bg-selection-bg', 'border-[2px]');
                selectedElement.classList.add('border-border', 'bg-surface');
                selectedElement.querySelector('.selection-check').classList.add('opacity-0', 'scale-50');
            }

            // Apply new selection styles
            el.classList.remove('border-border', 'bg-surface');
            el.classList.add('border-primary', 'bg-selection-bg', 'border-[2px]');
            el.querySelector('.selection-check').classList.remove('opacity-0', 'scale-50');
            el.querySelector('.selection-check').classList.add('opacity-100', 'scale-100');

            selectedElement = el;

            // Enable Next Button
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            nextBtn.classList.add('hover:shadow-xl', 'active:scale-95');

            // Haptic-like effect
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
</body></html>
