<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HobbyDNA - Survey</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "text-muted": "#A6A1B8",
                    "surface-container-highest": "#e7defe",
                    "tertiary": "#00554b",
                    "outline": "#787585",
                    "on-surface-variant": "#474554",
                    "on-primary-fixed-variant": "#3e2fb2",
                    "on-primary-container": "#e0dbff",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#fdf7ff",
                    "outline-variant": "#c8c4d6",
                    "secondary": "#ae3115",
                    "tertiary-fixed": "#71f8e4",
                    "tertiary-container": "#006f64",
                    "tertiary-fixed-dim": "#4fdbc8",
                    "on-tertiary-fixed": "#00201c",
                    "on-surface": "#1d182f",
                    "on-secondary-container": "#640f00",
                    "on-tertiary-container": "#6df4e1",
                    "surface-dim": "#dfd5f5",
                    "primary-fixed-dim": "#c5c0ff",
                    "on-secondary": "#ffffff",
                    "surface-container": "#f2ebff",
                    "secondary-fixed-dim": "#ffb4a3",
                    "inverse-on-surface": "#f5eeff",
                    "text-secondary": "#6B6580",
                    "on-primary-fixed": "#140067",
                    "skeleton": "#F0EDF9",
                    "border": "#EAE6F5",
                    "selection-bg": "#F0EDFF",
                    "secondary-container": "#fd6a49",
                    "primary": "#4234b6",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#ede4ff",
                    "on-background": "#1d182f",
                    "surface-variant": "#e7defe",
                    "inverse-surface": "#322d45",
                    "inverse-primary": "#c5c0ff",
                    "primary-container": "#5b4fcf",
                    "surface-container-low": "#f8f1ff",
                    "on-tertiary-fixed-variant": "#005048",
                    "on-secondary-fixed": "#3d0600",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#8c1900",
                    "surface": "#FFFFFF",
                    "primary-fixed": "#e4dfff",
                    "background": "#FBF9FF",
                    "surface-tint": "#574acb",
                    "secondary-fixed": "#ffdad2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "header-height": "56px",
                    "screen-padding": "20px",
                    "base": "8px",
                    "vertical-gap": "16px"
            },
            "fontFamily": {
                    "headline-h2": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-h1": ["Plus Jakarta Sans"],
                    "label-button": ["Plus Jakarta Sans"],
                    "caption": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-h2": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-h1": ["22px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "label-button": ["16px", {"lineHeight": "1.0", "fontWeight": "600"}],
                    "caption": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #FBF9FF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .selection-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .selection-card.active {
            border-color: #4234b6;
            background-color: #F0EDFF;
            border-width: 2px;
        }
        .progress-fill {
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .animate-warm-float {
            animation: warmFloat 6s ease-in-out infinite;
        }
        @keyframes warmFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col text-on-background">
<!-- Progress Bar (Fixed Top) -->
<div class="fixed top-0 left-0 w-full z-[60] h-1 bg-skeleton">
<div class="h-full bg-primary progress-fill" style="width: 66.6%;"></div>
</div>
<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 h-header-height flex items-center justify-between px-screen-padding bg-background/80 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<span class="font-headline-h2 text-headline-h2 text-primary font-bold">HobbyDNA</span>
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[72px] pb-32 px-screen-padding relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary/10 rounded-full blur-[80px] animate-warm-float"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-primary/10 rounded-full blur-[100px] animate-warm-float" style="animation-delay: -2s;"></div>
<!-- Question Section -->
<div class="relative z-10 mb-10">
<div class="inline-flex items-center gap-2 mb-3 px-3 py-1 bg-primary-container/20 rounded-full">
<span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-caption text-caption text-primary font-semibold">취향 보강 • 6/9</span>
</div>
<h1 class="font-headline-h1 text-headline-h1 text-on-background leading-tight mb-2">
                취미를 통해 얻고 싶은 게<br/>뭐예요?
            </h1>
<p class="font-body-md text-body-md text-text-secondary">
                최대 2개까지 선택할 수 있어요.
            </p>
</div>
<!-- Multi-Selection Bento Grid -->
<div class="grid grid-cols-2 gap-4 relative z-10">
<!-- Option 1 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="stress" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">😌</span>
</div>
<span class="font-label-button text-label-button text-on-surface">스트레스 해소</span>
</button>
<!-- Option 2 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="achievement" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">🏆</span>
</div>
<span class="font-label-button text-label-button text-on-surface">성취감</span>
</button>
<!-- Option 3 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="relationship" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">🤝</span>
</div>
<span class="font-label-button text-label-button text-on-surface">새로운 관계</span>
</button>
<!-- Option 4 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="creative" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">🎨</span>
</div>
<span class="font-label-button text-label-button text-on-surface">창작의 즐거움</span>
</button>
<!-- Option 5 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="growth" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">📈</span>
</div>
<span class="font-label-button text-label-button text-on-surface">자기계발/성장</span>
</button>
<!-- Option 6 -->
<button class="selection-card group flex flex-col items-center justify-center p-6 bg-surface border border-border rounded-[20px] aspect-square text-center shadow-sm hover:shadow-md active:scale-95" data-value="fun" onclick="toggleSelection(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="text-2xl">😄</span>
</div>
<span class="font-label-button text-label-button text-on-surface">그냥 재미로</span>
</button>
</div>
</main>
<!-- Fixed Bottom CTA -->
<footer class="fixed bottom-0 left-0 w-full p-screen-padding glass-panel z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-[56px] bg-text-muted text-on-primary rounded-xl font-label-button text-label-button transition-all flex items-center justify-center gap-2 disabled:cursor-not-allowed" disabled="" id="next-button">
                다음
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</footer>
<script>
        let selectedCount = 0;
        const maxSelection = 2;
        const nextBtn = document.getElementById('next-button');

        function toggleSelection(element) {
            const isActive = element.classList.contains('active');
            
            if (isActive) {
                element.classList.remove('active');
                selectedCount--;
            } else {
                if (selectedCount < maxSelection) {
                    element.classList.add('active');
                    selectedCount++;
                } else {
                    // Visual feedback for max selections reached
                    element.classList.add('shake');
                    setTimeout(() => element.classList.remove('shake'), 400);
                }
            }

            updateButtonState();
        }

        function updateButtonState() {
            if (selectedCount > 0) {
                nextBtn.disabled = false;
                nextBtn.classList.remove('bg-text-muted');
                nextBtn.classList.add('bg-secondary', 'active:scale-[0.98]', 'shadow-lg');
            } else {
                nextBtn.disabled = true;
                nextBtn.classList.add('bg-text-muted');
                nextBtn.classList.remove('bg-secondary', 'active:scale-[0.98]', 'shadow-lg');
            }
        }

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-4px); }
                75% { transform: translateX(4px); }
            }
            .shake { animation: shake 0.2s ease-in-out 2; }
        `;
        document.head.appendChild(style);
    </script>
</body></html>
