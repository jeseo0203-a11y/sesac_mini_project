            font-family: 'Plus Jakarta Sans', sans-serif;

            padding: 0;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gradient-sphere {
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>

                      "text-secondary": "#6B6580",

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background">
<!-- Decorative Background Shaders -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="gradient-sphere absolute -top-20 -left-20 w-80 h-80 rounded-full bg-primary-fixed opacity-40"></div>
<div class="gradient-sphere absolute top-1/2 -right-40 w-96 h-96 rounded-full bg-secondary-fixed opacity-30"></div>
<div class="gradient-sphere absolute -bottom-20 left-1/4 w-72 h-72 rounded-full bg-tertiary-fixed opacity-20"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-between py-12 px-screen-padding text-center">
<!-- Top Empty Space for Balance -->
<div class="w-full h-12"></div>
<!-- Center Identity Section -->
<div class="flex flex-col items-center max-w-sm w-full gap-8">
<!-- Icon Badge -->
<div class="animate-float">
<div class="relative w-48 h-48 rounded-full bg-surface shadow-xl flex items-center justify-center border border-border">
<!-- Glow effect behind icon -->
<div class="absolute inset-4 rounded-full bg-primary-container opacity-10 animate-pulse"></div>
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">
                        explore
                    </span>
</div>
</div>
<!-- Headlines -->
<div class="space-y-4">
<h1 class="font-headline-h1 text-headline-h1 text-on-background tracking-tight">
                    나를 모르는 나를 위한<br/>취미 발굴
                </h1>
<p class="font-body-md text-body-md text-text-secondary">
                    9가지 질문으로 당신의 취미 DNA를 찾아드려요
                </p>
</div>
</div>
<!-- Bottom Action & Navigation Section -->
<div class="w-full max-w-sm flex flex-col items-center gap-8">
<!-- Progress Dots -->
<div class="flex gap-2">
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- CTA Cluster -->
<div class="w-full space-y-4">
<button class="w-full h-[52px] bg-secondary-container text-on-primary font-label-button text-label-button rounded-xl shadow-lg active:scale-95 transition-all hover:opacity-90 flex items-center justify-center gap-2" onclick="handleStart()">
                    시작하기
                    <span class="material-symbols-outlined text-[20px]">chevron_right</span>
</button>
<p class="font-caption text-caption text-text-muted">
                    앱 설치 없이 바로 시작해요
                </p>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        function handleStart() {
            // Subtle feedback before navigation intent
            const btn = event.currentTarget;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                console.log("Onboarding sequence started...");
                // In a real app, this would trigger the first question
            }, 800);
        }

        // Initialize parallax effect for background spheres
        document.addEventListener('mousemove', (e) => {
            const spheres = document.querySelectorAll('.gradient-sphere');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            spheres.forEach((sphere, index) => {
                const speed = (index + 1) * 20;
                sphere.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body></html>
