<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }

    body {
      background-color: #FBF7F2;
      font-family: 'Be Vietnam Pro', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .custom-shadow {
      box-shadow: 0px 4px 20px rgba(74, 66, 59, 0.05);
    }

    .text-area-focus:focus {
      outline: none;
      border-color: #EF6C4D;
      box-shadow: 0 0 0 4px rgba(239, 108, 77, 0.05);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "tertiary": "#006a68",
            "primary": "#a8381e",
            "surface-container-low": "#fff0ed",
            "background": "#fff8f6",
            "secondary": "#3b6754",
            "on-secondary-fixed": "#002115",
            "on-secondary-fixed-variant": "#234f3d",
            "on-primary-container": "#5c0e00",
            "surface-dim": "#ecd5d0",
            "surface": "#fff8f6",
            "inverse-primary": "#ffb4a3",
            "on-error-container": "#93000a",
            "error-container": "#ffdad6",
            "on-primary": "#ffffff",
            "on-background": "#251916",
            "inverse-surface": "#3b2d2a",
            "on-tertiary-container": "#003332",
            "secondary-fixed": "#bdedd5",
            "primary-fixed-dim": "#ffb4a3",
            "error": "#ba1a1a",
            "surface-bright": "#fff8f6",
            "on-tertiary": "#ffffff",
            "secondary-fixed-dim": "#a2d1ba",
            "tertiary-fixed-dim": "#5cd9d6",
            "primary-container": "#ef6c4d",
            "on-surface": "#251916",
            "on-error": "#ffffff",
            "on-secondary-container": "#416d5a",
            "outline": "#8b716b",
            "on-primary-fixed-variant": "#872108",
            "surface-container-highest": "#f4ded9",
            "on-tertiary-fixed": "#00201f",
            "surface-container-high": "#fae3de",
            "on-primary-fixed": "#3d0700",
            "inverse-on-surface": "#ffede9",
            "surface-container": "#ffe9e4",
            "secondary-container": "#bdedd5",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "primary-fixed": "#ffdad2",
            "on-surface-variant": "#58423c",
            "surface-tint": "#a8381e",
            "surface-variant": "#f4ded9",
            "outline-variant": "#dfc0b8",
            "tertiary-fixed": "#7bf6f3",
            "tertiary-container": "#00a5a3",
            "on-tertiary-fixed-variant": "#00504f"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "stack_gap_sm": "8px",
            "edge_margin": "20px",
            "stack_gap_lg": "24px",
            "stack_gap_md": "16px",
            "section_padding": "32px",
            "container_max_width": "480px"
          },
          "fontFamily": {
            "body-md": ["Be Vietnam Pro"],
            "body-lg": ["Be Vietnam Pro"],
            "body-sm": ["Be Vietnam Pro"],
            "headline-md": ["Plus Jakarta Sans"],
            "label-sm": ["Be Vietnam Pro"],
            "headline-lg": ["Plus Jakarta Sans"],
            "label-md": ["Be Vietnam Pro"]
          },
          "fontSize": {
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
            "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
</head>
<body class="bg-[#FBF7F2] text-on-surface">
<div class="max-w-[480px] mx-auto min-h-screen relative flex flex-col pb-[100px]">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex justify-between items-center w-full px-edge_margin h-[56px] bg-surface border-b border-outline-variant">
<h1 class="font-headline-md text-[20px] font-bold text-primary">할래말래</h1>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low transition-colors p-2 rounded-full">bookmark</button>
</div>
</header>
<main class="flex-1 px-edge_margin pt-section_padding space-y-stack_gap_lg">
<!-- Welcome Banner -->
<section class="space-y-stack_gap_sm">
<h2 class="font-headline-lg text-[26px] leading-[1.3] text-on-surface font-bold">오랜만이에요,<br/>요즘 어떻게 지내세요?</h2>
<p class="font-body-md text-on-surface-variant">지난 활동의 여운을 기록해볼까요?</p>
</section>
<!-- Feedback Question Card -->
<section class="bg-white rounded-[16px] p-stack_gap_lg custom-shadow border border-[#ECE3D8]">
<h3 class="font-headline-md text-[20px] text-on-surface mb-stack_gap_md leading-tight">지난번 추천드린 '컬러링북',<br/>해보셨어요?</h3>
<!-- Choice Chips -->
<div class="flex flex-wrap gap-stack_gap_sm mb-stack_gap_lg">
<button class="px-4 py-2.5 rounded-full border border-outline-variant bg-surface font-label-md text-on-surface-variant hover:bg-primary-container hover:text-white hover:border-primary-container transition-all" onclick="selectChip(this)">좋았음</button>
<button class="px-4 py-2.5 rounded-full border border-outline-variant bg-surface font-label-md text-on-surface-variant hover:bg-primary-container hover:text-white hover:border-primary-container transition-all" onclick="selectChip(this)">별로였음</button>
<button class="px-4 py-2.5 rounded-full border border-outline-variant bg-surface font-label-md text-on-surface-variant hover:bg-primary-container hover:text-white hover:border-primary-container transition-all" onclick="selectChip(this)">잘 모르겠음</button>
</div>
<!-- Input Area -->
<div class="space-y-stack_gap_sm">
<label class="font-label-md text-on-surface-variant px-1">해보셨다면 어땠나요?</label>
<textarea class="w-full min-h-[120px] p-4 bg-[#FBF7F2] rounded-[12px] border-[1.5px] border-[#ECE3D8] font-body-md text-area-focus transition-all resize-none" placeholder="부담 없이 당신의 느낌을 적어주세요."></textarea>
</div>
</section>
<!-- Re-suggestion Soft Card -->
<section class="bg-[#F3ECE3] rounded-[16px] p-stack_gap_lg flex items-start gap-4">
<div class="bg-white p-2 rounded-full text-primary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div>
<h4 class="font-headline-md text-[17px] font-semibold text-on-surface mb-1">괜찮아요, 더 작게 다시 시작해봐요</h4>
<p class="font-body-sm text-on-surface-variant leading-relaxed">
            완벽하지 않아도 괜찮습니다. 오늘 하루의 작은 시도가 내일의 에너지가 될 거예요. 당신의 속도에 맞춘 다른 제안들을 확인해볼까요?
          </p>
<button class="mt-stack_gap_md font-label-md text-primary flex items-center gap-1 group">
            다른 활동 추천받기
            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</section>
<!-- Decorative Visual -->
<div class="relative w-full h-[140px] rounded-[16px] overflow-hidden mt-4">
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/20 to-secondary-container/20"></div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-24 h-24 bg-white/40 rounded-full blur-2xl animate-pulse"></div>
</div>
<div class="absolute inset-0 bg-cover bg-center opacity-60" data-alt="A peaceful and minimalist flat illustration of a cozy indoor scene with a soft tea cup and a coloring book on a wooden table. The lighting is warm and golden, reflecting a hygge atmosphere with soft shadows and pastel peach and sage green tones. The artistic style is modern, clean, and emotionally soothing." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBmXTLaa9zo6Rlg8VMGdHzK83hAclIATj4j_ZaCGihz2HcCdqfJlF7fegGsxMIj9DA6G91fUwCWHCAmRD3xT6T737es1PB1pcE96VQz_i_vRB3YKwnx9I0afpZ9go8k2SJn5FkzD466WTK-fBc6XNZiuzc418oxeozRrui5LWYF25G2uC_iZTFFZXk9S5LdEt4ScwzAwYWZ-aNatL7ayrKwkpI0nMuP6ke93QgkANQVtT93tQlV6TMJAU8PW67kAcSoO2byZiqHssMb')"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-[#EF6C4D] text-white py-4 rounded-[12px] font-headline-md text-[16px] font-bold hover:bg-[#D6553B] active:scale-[0.98] transition-all shadow-md">
        체크인 완료하기
      </button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-container_max_width z-50 flex justify-around items-center px-edge_margin bg-surface h-[60px] border-t border-outline-variant">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/3 h-full" href="#">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-label-sm text-label-sm">추천</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/3 h-full" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="font-label-sm text-label-sm">저장함</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold w-1/3 h-full scale-95 transition-transform" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">내 상태</span>
</a>
</nav>
</div>
<script>
    function selectChip(button) {
      // Deselect all buttons in the same container
      const container = button.parentElement;
      const buttons = container.querySelectorAll('button');
      buttons.forEach(btn => {
        btn.classList.remove('bg-primary-container', 'text-white', 'border-primary-container');
        btn.classList.add('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
      });

      // Select clicked button
      button.classList.remove('bg-surface', 'text-on-surface-variant', 'border-outline-variant');
      button.classList.add('bg-primary-container', 'text-white', 'border-primary-container');
    }

    // Micro-interaction for feedback
    document.querySelector('textarea').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body></html>
