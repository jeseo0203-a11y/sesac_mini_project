<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .selection-card-active {
            border-width: 2px !important;
            border-color: #4234b6 !important;
            background-color: #F0EDFF !important;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.4s ease-out forwards;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "text-muted": "#A6A1B8",
                    "surface-container-highest": "#e7defe",
                    "tertiary": "#00554b",
                    "outline": "#787585",
                    "on-surface-variant": "#474554",
                    "on-primary-fixed-variant": "#3e2fb2",
                    "on-primary-container": "#e0dbff",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#fdf7ff",
                    "outline-variant": "#c8c4d6",
                    "secondary": "#ae3115",
                    "tertiary-fixed": "#71f8e4",
                    "tertiary-container": "#006f64",
                    "tertiary-fixed-dim": "#4fdbc8",
                    "on-tertiary-fixed": "#00201c",
                    "on-surface": "#1d182f",
                    "on-secondary-container": "#640f00",
                    "on-tertiary-container": "#6df4e1",
                    "surface-dim": "#dfd5f5",
                    "primary-fixed-dim": "#c5c0ff",
                    "on-secondary": "#ffffff",
                    "surface-container": "#f2ebff",
                    "secondary-fixed-dim": "#ffb4a3",
                    "inverse-on-surface": "#f5eeff",
                    "text-secondary": "#6B6580",
                    "on-primary-fixed": "#140067",
                    "skeleton": "#F0EDF9",
                    "border": "#EAE6F5",
                    "selection-bg": "#F0EDFF",
                    "secondary-container": "#fd6a49",
                    "primary": "#4234b6",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#ede4ff",
                    "on-background": "#1d182f",
                    "surface-variant": "#e7defe",
                    "inverse-surface": "#322d45",
                    "inverse-primary": "#c5c0ff",
                    "primary-container": "#5b4fcf",
                    "surface-container-low": "#f8f1ff",
                    "on-tertiary-fixed-variant": "#005048",
                    "on-secondary-fixed": "#3d0600",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#8c1900",
                    "surface": "#FFFFFF",
                    "primary-fixed": "#e4dfff",
                    "background": "#FBF9FF",
                    "surface-tint": "#574acb",
                    "secondary-fixed": "#ffdad2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "header-height": "56px",
                    "screen-padding": "20px",
                    "base": "8px",
                    "vertical-gap": "16px"
            },
            "fontFamily": {
                    "headline-h2": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-h1": ["Plus Jakarta Sans"],
                    "label-button": ["Plus Jakarta Sans"],
                    "caption": ["Plus Jakarta Sans"]
            },
            "fontSize": {
                    "headline-h2": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "body-md": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-h1": ["22px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "label-button": ["16px", {"lineHeight": "1.0", "fontWeight": "600"}],
                    "caption": ["13px", {"lineHeight": "1.4", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 px-screen-padding flex items-center justify-between bg-background h-[56px]">
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-primary text-[28px]">arrow_back</span>
</button>
<span class="font-headline-h1 text-headline-h1 text-primary">HobbyDNA</span>
<div class="w-[28px]"></div> <!-- Spacer -->
</header>
<!-- Progress Bar (Fixed below header) -->
<div class="fixed top-[56px] left-0 w-full h-1 bg-skeleton z-40">
<div class="h-full bg-primary transition-all duration-700 ease-in-out" style="width: 88.8%;"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow pt-[80px] pb-[100px] px-screen-padding max-w-md mx-auto w-full">
<!-- Animated Background Decor -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">

</div>
<div class="animate-slide-in">
<!-- Category Tag -->
<div class="inline-flex items-center px-3 py-1 rounded-full bg-primary-container text-on-primary-container font-caption text-caption mb-4">
                취향 보강
            </div>
<!-- Question & Subtext -->
<h1 class="font-headline-h1 text-headline-h1 mb-2">어디서 즐기고 싶으세요?</h1>
<p class="font-body-md text-body-md text-text-secondary mb-8">가장 편안하게 느껴지는 활동 반경을 알려주세요.</p>
<!-- Selection Options -->
<div class="space-y-4" id="selection-group">
<!-- Option 1: Home -->
<button class="w-full flex items-center p-5 bg-surface border border-border rounded-[14px] text-left transition-all hover:border-primary/30 active:scale-[0.98]" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center mr-4">
<span class="text-2xl">🏠</span>
</div>
<div class="flex-grow">
<span class="font-label-button text-label-button block">집에서</span>
<span class="font-caption text-caption text-text-muted">아늑하고 조용한 나만의 공간</span>
</div>
<span class="material-symbols-outlined text-border check-icon">check_circle</span>
</button>
<!-- Option 2: Neighborhood -->
<button class="w-full flex items-center p-5 bg-surface border border-border rounded-[14px] text-left transition-all hover:border-primary/30 active:scale-[0.98]" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center mr-4">
<span class="text-2xl">🚶</span>
</div>
<div class="flex-grow">
<span class="font-label-button text-label-button block">동네에서</span>
<span class="font-caption text-caption text-text-muted">가벼운 산책 거리 내외의 장소</span>
</div>
<span class="material-symbols-outlined text-border check-icon">check_circle</span>
</button>
<!-- Option 3: Exploration -->
<button class="w-full flex items-center p-5 bg-surface border border-border rounded-[14px] text-left transition-all hover:border-primary/30 active:scale-[0.98]" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-xl bg-surface-container-low flex items-center justify-center mr-4">
<span class="text-2xl">🗺</span>
</div>
<div class="flex-grow">
<span class="font-label-button text-label-button block">멀리 나가서 탐험</span>
<span class="font-caption text-caption text-text-muted">새로운 장소로 떠나는 설렘</span>
</div>
<span class="material-symbols-outlined text-border check-icon">check_circle</span>
</button>
</div>
</div>
<!-- Emotional Visual Element -->
<div class="mt-12 rounded-2xl overflow-hidden shadow-sm animate-slide-in" style="animation-delay: 0.2s;">
<div class="w-full h-40 bg-cover bg-center" data-alt="A warm, cozy interior scene with soft natural lighting filtering through large windows. The environment is minimalist and clean, representing home comfort, yet blends seamlessly into a vibrant, sunlit neighborhood street with lush greenery. The aesthetic is modern corporate, high-end, using a palette of soft lavender, pure white, and vibrant primary violet accents, creating a sense of calm optimism and a journey of discovery." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDdQyukOD5ZUGhN9l7EQFcF8Vg_duWdeV7uoakS-nQ9SWd_fFqBjQRcubWlue3MO_r6ziilhwsiciQzRtIlnfCjY8wiNLKkID_gtCEyUrdDIIBy0wIrWBMczvpIQtNCO-qu9c_yf5Vq7QI3PhhvQSXGnnGP1Il9LLD5YsEKrmXjnyevuSKrv6DGlllGKBBvEF9Jcfg-Bb1dVRjmPU41rx3GGiJygZIojOy-jC1hqFkYqd-if9NGjTMPRYqWM25oIIy_dgg-bp62Yy8r')"></div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<div class="fixed bottom-0 left-0 w-full p-screen-padding bg-background/80 backdrop-blur-md">
<button class="w-full h-[52px] rounded-full bg-secondary text-on-primary font-label-button text-label-button opacity-50 transition-all active:scale-95 disabled:cursor-not-allowed" disabled="" id="next-button">
            다음
        </button>
</div>
<script>
        function selectOption(element) {
            // Remove active classes from all options
            const options = document.querySelectorAll('#selection-group button');
            options.forEach(opt => {
                opt.classList.remove('selection-card-active');
                opt.querySelector('.check-icon').classList.remove('text-primary');
                opt.querySelector('.check-icon').classList.add('text-border');
                opt.querySelector('.check-icon').style.fontVariationSettings = "'FILL' 0";
            });

            // Add active class to selected option
            element.classList.add('selection-card-active');
            const icon = element.querySelector('.check-icon');
            icon.classList.remove('text-border');
            icon.classList.add('text-primary');
            icon.style.fontVariationSettings = "'FILL' 1";

            // Enable CTA button
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50');
            nextBtn.classList.add('shadow-lg', 'shadow-secondary/20');
        }
    </script>
</body></html>
