<body class="font-body-md">

</div>
<div class="p-stack_gap_md space-y-2">

</div>
</div>
<div class="bg-[#FBF0DA] p-4 rounded-xl border border-[#A9762C33]">
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-[#A9762C]">payments</span>
<p class="text-[12px] font-body-sm text-[#A9762C]">예상 비용: 약 15,000원 (필사 노트 기준)</p>

<!-- Dim Layer Overlay -->

<div class="px-edge_margin pb-8 pt-4 space-y-stack_gap_lg">
<!-- Header -->

<h2 class="font-headline-md text-headline-md text-on-surface">다시 맞춰볼게요</h2>
<p class="font-body-md text-[15px] text-on-surface-variant">어떤 점이 부담스러우셨어요?</p>

<!-- Feedback Selection Chips -->
<div class="flex flex-wrap gap-stack_gap_sm">
<button class="px-4 py-2 rounded-full border border-outline-variant bg-surface text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-low transition-colors active:scale-95">시간 부담</button>

<script>
        // Simple Interaction Logic
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                // Visual feedback for chip selection if not the primary CTA
                if (this.classList.contains('border-outline-variant')) {
                    document.querySelectorAll('.flex.flex-wrap button').forEach(b => {
                        b.classList.remove('border-2', 'border-primary', 'bg-primary-container/10', 'text-primary');
                        b.classList.add('border', 'border-outline-variant', 'bg-surface', 'text-on-surface-variant');
                    });
                    this.classList.remove('border', 'border-outline-variant', 'bg-surface', 'text-on-surface-variant');
                    this.classList.add('border-2', 'border-primary', 'bg-primary-container/10', 'text-primary');
                }
            });
        });

        // Close bottom sheet when clicking overlay
        document.querySelector('.dim-overlay').addEventListener('click', () => {
            // In a real app, this would trigger navigation or state change
            console.log('Close bottom sheet requested');
        });
