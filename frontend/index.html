<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>하비DNA — 취미 발굴 AI</title>
<script src="/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
<style>
  :root{
    /* HobbyRo Design System — color tokens */
    --surface:#FCF8FF; --surface-dim:#D9D7F5; --surface-bright:#FCF8FF;
    --surface-container-lowest:#FFFFFF; --surface-container-low:#F5F2FF;
    --surface-container:#EEECFF; --surface-container-high:#E8E6FF; --surface-container-highest:#E2E0FD;
    --on-surface:#19192F; --on-surface-variant:#48464D;
    --inverse-surface:#2E2E45; --inverse-on-surface:#F2EFFF;
    --outline:#79767E; --outline-variant:#C9C5CE;
    --primary:#605A7C; --on-primary:#FFFFFF; --primary-container:#E0D7FF; --on-primary-container:#625C7E;
    --inverse-primary:#CAC1E8; --primary-fixed:#E6DEFF; --primary-fixed-dim:#CAC1E8;
    --secondary:#695D4A; --on-secondary:#FFFFFF; --secondary-container:#F2E0C8; --on-secondary-container:#6F6350;
    --tertiary:#416656; --on-tertiary:#FFFFFF; --tertiary-container:#BDE5D1; --on-tertiary-container:#436858;
    --error:#BA1A1A; --on-error:#FFFFFF; --error-container:#FFDAD6; --on-error-container:#93000A;
    --background:#FCF8FF; --on-background:#19192F;
    --accent-peach:#EAC08F;

    /* aliases kept so existing component rules stay readable */
    --primary-c:#7A6F99;
    --secondary-c:var(--secondary-container);
    --tertiary-c:var(--tertiary);
    --surf:var(--surface-container-lowest);
    --surf-low:var(--surface-container-low);
    --surf-high:var(--surface-container-high);
    --outline-s:var(--outline);
    --on-var:var(--on-surface-variant);

    /* shape */
    --r-sm:.25rem; --r-md:.75rem; --r-lg:1rem; --r-xl:1.5rem; --r-full:9999px;
    --r-card:var(--r-xl); --r-btn:var(--r-lg); --r-pill:var(--r-full);

    /* spacing */
    --sp-xs:4px; --sp-base:8px; --sp-sm:12px; --sp-md:24px; --sp-lg:40px; --sp-xl:64px;
    --container-margin:20px; --gutter:16px;

    /* ambient tonal depth */
    --shadow:0 12px 30px rgba(96,90,124,.06);
    --shadow-lg:0 16px 40px rgba(96,90,124,.12);
    --glass-bg:rgba(255,255,255,.6); --glass-blur:10px;

    --head:'Plus Jakarta Sans','Pretendard',system-ui,sans-serif;
    --body:'Be Vietnam Pro','Pretendard',system-ui,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:var(--body); color:var(--on-surface);
       background:linear-gradient(160deg,var(--surface-container-low) 0%,var(--primary-fixed) 130%); min-height:100vh;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;}
  /* 폰 프레임 (모바일 기본) */
  #app{max-width:440px; margin:0 auto; background:var(--surface); min-height:100vh;
       position:relative; box-shadow:var(--shadow-lg); overflow:hidden; transition:max-width .2s ease;}
  .screen{display:none; padding:0 var(--container-margin) 96px; animation:fade .25s ease;}
  .screen.on{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* 상단 앱바 (글래스모피즘) */
  .appbar{position:sticky; top:0; z-index:40; background:var(--glass-bg);
          -webkit-backdrop-filter:blur(var(--glass-blur)); backdrop-filter:blur(var(--glass-blur));
          display:flex; align-items:center; justify-content:space-between;
          height:60px; padding:0 var(--container-margin); border-bottom:1px solid rgba(201,197,206,.35);}
  .appbar .l{display:flex; align-items:center; gap:var(--sp-base);}
  .appbar .avatar{width:32px; height:32px; border-radius:var(--r-full); background:var(--primary-fixed);
                  display:flex; align-items:center; justify-content:center; overflow:hidden;
                  color:var(--primary); font-weight:700; font-size:14px;}
  .appbar .avatar img{width:100%;height:100%;object-fit:cover;}
  .appbar h1{font-family:var(--head); font-size:19px; font-weight:700; color:var(--primary); margin:0;}
  .appbar .ic{color:var(--primary); background:none; border:none; cursor:pointer; font-size:24px;}
  .appbar.back h1{color:var(--on-surface); font-size:17px;}

  /* 타이포 */
  .h-disp{font-family:var(--head); font-size:28px; font-weight:700; letter-spacing:-.02em; line-height:1.2; margin:0;}
  .h-lg{font-family:var(--head); font-size:24px; font-weight:600; letter-spacing:-.01em; margin:0;}
  .h-md{font-family:var(--head); font-size:18px; font-weight:700; margin:0;}
  .muted{color:var(--on-surface-variant);}
  .sec-title{display:flex; align-items:center; justify-content:space-between; margin:22px 0 12px;}
  .sec-title .more{font-family:var(--head); color:var(--primary); font-size:13.5px; font-weight:600; background:none; border:none; cursor:pointer;}

  /* 버튼 (필 형태 + 라벤더→피치 그라디언트 + 이너 글로우) */
  .btn{width:100%; min-height:52px; border:none; border-radius:var(--r-full);
       background:linear-gradient(135deg,var(--primary) 0%,#8a7ba8 55%,var(--accent-peach) 130%);
       color:var(--on-primary); font-family:var(--head); font-size:16px; font-weight:600; cursor:pointer;
       box-shadow:0 10px 24px rgba(96,90,124,.28), inset 0 1px 0 rgba(255,255,255,.35); transition:transform .12s, box-shadow .12s;
       display:flex; align-items:center; justify-content:center; gap:var(--sp-base);}
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:var(--primary-fixed); color:var(--primary); box-shadow:none;}
  .btn.outline{background:transparent; color:var(--primary); border:1.5px solid var(--primary); box-shadow:none;}

  /* 칩 */
  .chips{display:flex; gap:var(--sp-base); flex-wrap:wrap;}
  .chip{font-family:var(--head); border:1px solid var(--outline-variant); background:var(--surf); color:var(--on-surface-variant);
        padding:9px 14px; border-radius:var(--r-lg); font-size:14px; font-weight:500; cursor:pointer;
        display:inline-flex; align-items:center; gap:6px; transition:.15s;}
  .chip.sel{background:var(--primary-fixed); border-color:var(--primary); color:var(--primary); font-weight:600;}
  .tag{font-family:var(--head); background:var(--primary-fixed); color:var(--primary); font-size:11px; font-weight:600;
       padding:3px 9px; border-radius:var(--r-full);}

  /* 카드 */
  .card{background:var(--surface-container-lowest); border:1px solid rgba(96,90,124,.12); border-radius:var(--r-xl);
        box-shadow:var(--shadow); padding:16px; transition:box-shadow .15s;}
  .thumb{width:100%; height:150px; border-radius:var(--r-lg); background:linear-gradient(135deg,var(--primary-fixed),var(--inverse-primary));
         display:flex; align-items:center; justify-content:center; font-size:54px;}
  .thumb.sm{width:64px; height:64px; font-size:32px; flex-shrink:0; border-radius:var(--r-md);}

  /* 히어로(홈/진단 인트로) */
  .hero{position:relative; overflow:hidden; background:linear-gradient(135deg,var(--primary) 0%,#8a7ba8 100%); color:#fff;
        border-radius:var(--r-xl); padding:22px; margin-top:6px; box-shadow:var(--shadow-lg);}
  .hero::after{content:""; position:absolute; top:-40px; right:-40px; width:150px; height:150px;
               background:rgba(255,255,255,.16); border-radius:50%; filter:blur(30px);}
  .hero h2{position:relative; z-index:1; font-family:var(--head); font-size:22px; font-weight:700;
           margin:0 0 6px; line-height:1.3;}
  .hero p{position:relative; z-index:1; margin:0 0 16px; color:rgba(255,255,255,.9); font-size:14px;}
  .hero .btn{background:#fff; color:var(--primary); box-shadow:none;}

  /* 무드칩 로우 */
  .mood-row{display:flex; gap:var(--sp-base); overflow-x:auto; padding-bottom:4px;}
  .mood-row::-webkit-scrollbar{display:none;}
  .mood{font-family:var(--head); flex:0 0 auto; border:1px solid var(--outline-variant); background:var(--surf); border-radius:var(--r-full);
        padding:9px 14px; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; transition:.15s;}
  .mood.sel{background:var(--primary); color:#fff; border-color:var(--primary);}

  /* 추천/보관함 리스트 아이템 */
  .item{display:flex; gap:12px; align-items:center; background:var(--surf); border:1px solid rgba(96,90,124,.10);
        border-radius:var(--r-xl); padding:10px; box-shadow:var(--shadow); margin-bottom:10px; transition:box-shadow .15s;}
  .item h4{margin:0 0 3px; font-size:14.5px; font-weight:600; font-family:var(--head);}
  .item .meta{margin:0; font-size:12.5px; color:var(--on-surface-variant);}
  .item .st{font-family:var(--head); font-size:11px; font-weight:600; padding:3px 9px; border-radius:var(--r-full);
            background:var(--secondary-container); color:var(--on-secondary-container); white-space:nowrap;}
  .item .st.active{background:var(--primary-fixed); color:var(--primary);}

  /* 탐색 카테고리 그리드 */
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .cat{background:var(--surface-container-low); border:1px solid rgba(96,90,124,.10); border-radius:var(--r-xl);
       padding:16px; cursor:pointer; text-align:center; transition:.15s;}
  .cat:hover{background:var(--primary-fixed);}
  .cat .e{font-size:26px;} .cat .t{margin-top:6px; font-weight:600; font-size:14px; font-family:var(--head);}

  /* 진단 옵션 카드 */
  .qwrap{padding-top:8px;}
  .dots{display:flex; gap:6px; justify-content:center; margin:var(--sp-md) 0;}
  .dots i{width:8px; height:8px; border-radius:50%; background:var(--outline-variant); transition:.2s;}
  .dots i.on{background:var(--primary); width:22px; border-radius:5px;}
  .q-title{font-family:var(--head); font-size:20px; font-weight:700; text-align:center; margin:8px 4px 4px; line-height:1.35;}
  .q-sub{text-align:center; color:var(--on-surface-variant); font-size:13.5px; margin-bottom:18px;}
  .opt{display:flex; align-items:center; gap:12px; width:100%; text-align:left; cursor:pointer;
       background:var(--surf); border:1px solid rgba(96,90,124,.12); border-radius:var(--r-xl);
       padding:15px; margin-bottom:10px; transition:.15s; font-family:var(--body);}
  .opt .oi{width:40px; height:40px; border-radius:var(--r-md); background:var(--primary-fixed); color:var(--primary);
           display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0;}
  .opt .ot{font-size:15px; font-weight:600; color:var(--on-surface);}
  .opt.sel{border-color:var(--primary); background:var(--primary-fixed);}
  .opt.sel .oi{background:var(--primary); color:#fff;}
  .bubble{background:var(--surface-container-low); border:1px solid rgba(96,90,124,.12); border-radius:var(--r-lg);
          padding:14px 16px; font-size:15px; line-height:1.6; margin:6px 0 16px;}
  .input-row{display:flex; gap:8px; margin-top:8px;}
  .input-row input{flex:1; padding:14px; border-radius:var(--r-lg); border:1px solid var(--outline-variant);
                   background:var(--surf); font-size:15px; font-family:var(--body);}
  .input-row input:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(96,90,124,.14);}

  /* 로딩 점 */
  .typing{display:flex; gap:6px; padding:16px; justify-content:center;}
  .typing span{width:8px; height:8px; border-radius:50%; background:var(--outline-variant); animation:blink 1.2s infinite both;}
  .typing span:nth-child(2){animation-delay:.2s;} .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;transform:translateY(0);}40%{opacity:1;transform:translateY(-3px);}}

  /* 리포트 */
  .stats3{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .stat{background:var(--surface-container-low); border:1px solid rgba(96,90,124,.10); border-radius:var(--r-xl); padding:12px 6px; text-align:center;}
  .stat .l{display:block; font-size:11px; color:var(--on-surface-variant); margin-bottom:3px; font-family:var(--head);}
  .stat .v{display:block; font-size:13.5px; font-weight:700; color:var(--primary); font-family:var(--head);}
  .insight{position:relative; overflow:hidden; background:linear-gradient(135deg,var(--primary) 0%,#8a7ba8 100%); color:#fff; border-radius:var(--r-xl); padding:18px; margin-top:14px; box-shadow:var(--shadow-lg);}
  .insight::after{content:""; position:absolute; top:-40px; right:-40px; width:150px; height:150px; background:rgba(255,255,255,.15); border-radius:50%; filter:blur(30px);}
  .insight h3{position:relative; z-index:1; font-family:var(--head); font-size:20px; font-weight:700; margin:0 0 8px;}
  .insight p{position:relative; z-index:1; margin:0; font-size:14px; line-height:1.6; color:rgba(255,255,255,.92);}
  .mission{background:var(--secondary-container); border:1px solid rgba(105,93,74,.18); border-radius:var(--r-xl); padding:18px; margin-top:16px;}
  .mission .b{font-family:var(--head); display:inline-block; font-size:11px; font-weight:600; color:var(--on-secondary-container); background:rgba(255,255,255,.6); padding:4px 9px; border-radius:var(--r-md); margin-bottom:8px;}
  .react{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:14px;}
  .react button{font-family:var(--head); height:54px; border-radius:var(--r-md); border:1px solid var(--outline-variant); background:var(--surf); color:var(--on-surface-variant); font-size:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; transition:.15s;}
  .react button:hover{background:var(--surface-container-low); border-color:var(--primary); color:var(--primary);}
  .disc{font-size:11.5px; color:var(--outline); text-align:center; margin-top:14px; line-height:1.5;}

  /* 빈 상태 */
  .empty{text-align:center; padding:48px 20px; color:var(--on-surface-variant);}
  .empty .e{font-size:44px;} .empty p{margin:12px 0 20px;}

  /* 하단 탭 (글래스모피즘) */
  .bottomnav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:440px;
             background:var(--glass-bg); -webkit-backdrop-filter:blur(var(--glass-blur)); backdrop-filter:blur(var(--glass-blur));
             border-top:1px solid rgba(201,197,206,.35); z-index:50;
             display:flex; justify-content:space-around; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
             box-shadow:0 -8px 24px rgba(96,90,124,.07); transition:all .2s ease;}
  .tab{flex:1; background:none; border:none; cursor:pointer; color:var(--outline);
       display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; font-size:11px; font-family:var(--head); font-weight:500; border-radius:var(--r-lg); transition:.15s;}
  .tab .material-symbols-outlined{font-size:24px;}
  .tab.on{color:var(--primary); font-weight:700;}
  .tab.on .material-symbols-outlined{font-variation-settings:'FILL' 1;}

  /* 로그인 */
  #login{display:flex; flex-direction:column; justify-content:center; min-height:100vh; padding:32px; text-align:center; gap:14px;}
  #login .logo{font-size:52px;}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--inverse-surface); color:var(--inverse-on-surface);
         padding:10px 18px; border-radius:var(--r-full); font-size:13.5px; z-index:100; opacity:0; transition:.25s; pointer-events:none; white-space:nowrap;
         box-shadow:var(--shadow-lg);}
  .toast.show{opacity:1;}

  /* ────────────────────────────────────────────────
     반응형: 데스크톱 (>= 900px) — 12컬럼 플루이드 그리드,
     최대 1200px, 넉넉한 40px 거터, 플로팅 필 네비게이션
     ──────────────────────────────────────────────── */
  @media (min-width:900px){
    body{padding:var(--sp-lg) 0;}
    #app{max-width:1200px; min-height:auto; border-radius:var(--r-xl); box-shadow:var(--shadow-lg); padding-bottom:var(--sp-lg);}
    .screen{max-width:760px; margin:0 auto; padding-left:var(--sp-xl); padding-right:var(--sp-xl); padding-bottom:140px;}
    #login{max-width:520px; margin:0 auto;}

    .appbar{height:76px; padding:0 var(--sp-xl); border-radius:var(--r-xl) var(--r-xl) 0 0;}
    .appbar h1{font-size:22px;}

    .h-disp{font-size:40px;}
    .h-lg{font-size:28px;}

    .grid2{grid-template-columns:repeat(3,1fr); gap:var(--sp-md);}
    .stats3{gap:var(--sp-sm);}
    .react{gap:var(--sp-sm);}

    .card:hover, .item:hover, .cat:hover{box-shadow:var(--shadow-lg); transform:translateY(-2px);}
    .cat{transition:.15s, transform .15s;}
    .btn:hover{filter:brightness(1.04);}

    /* 하단 탭 → 떠 있는 필 형태의 독(dock) 내비게이션 */
    .bottomnav{position:fixed; bottom:var(--sp-md); left:50%; transform:translateX(-50%);
               width:auto; max-width:none; border-top:none; border:1px solid rgba(255,255,255,.6);
               border-radius:var(--r-full); padding:8px 10px; gap:4px; box-shadow:var(--shadow-lg);}
    .tab{flex:0 0 auto; flex-direction:row; padding:10px 20px; font-size:13px; gap:6px;}
    .tab.on{background:var(--primary-fixed);}
  }

  /* 반응형: 좁은 모바일(<380px) 여백 살짝 축소 */
  @media (max-width:380px){
    :root{ --container-margin:16px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- 로그인 -->
  <div id="login">
    <div class="logo">🧬</div>
    <h2 class="h-lg" style="color:var(--primary)">하비DNA</h2>
    <p class="muted">취미가 없고 나도 날 모르는 당신을 위한<br/>취미 발굴 AI 에이전트</p>
    <button class="btn" onclick="login()">Google로 시작하기</button>
    <a href="#" onclick="devStart();return false;" class="muted" style="font-size:13px">로컬 테스트로 시작 (DEV_NO_AUTH=1)</a>
  </div>

  <!-- 앱 셸 -->
  <div id="shell" style="display:none;">
    <div class="appbar" id="appbar"></div>
    <div id="scr-home" class="screen"></div>
    <div id="scr-diag" class="screen"></div>
    <div id="scr-library" class="screen"></div>
    <div id="scr-settings" class="screen"></div>
    <div id="scr-category" class="screen"></div>
    <div id="scr-detail" class="screen"></div>
  </div>

  <!-- 하단 탭 -->
  <nav class="bottomnav" id="bottomnav" style="display:none;">
    <button class="tab on" data-tab="home" onclick="go('home')"><span class="material-symbols-outlined">home</span>홈</button>
    <button class="tab" data-tab="diag" onclick="go('diag')"><span class="material-symbols-outlined">auto_awesome</span>진단</button>
    <button class="tab" data-tab="library" onclick="go('library')"><span class="material-symbols-outlined">bookmark</span>보관함</button>
    <button class="tab" data-tab="settings" onclick="go('settings')"><span class="material-symbols-outlined">settings</span>설정</button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const API = window.HOBBY_API;
let token = localStorage.getItem("hobby_token") || "";
let me = {name:"친구", picture:""};
let sessionId = null;
let curTab = "home";

if(location.hash.startsWith("#token=")){
  token = decodeURIComponent(location.hash.slice(7));
  localStorage.setItem("hobby_token", token);
  history.replaceState(null,"",location.pathname);
}
function login(){ location.href = API + "/auth/google/login"; }
function devStart(){ token='dev'; localStorage.setItem('hobby_token','dev'); boot(); }
function headers(){ return {"Content-Type":"application/json","Authorization":"Bearer "+token}; }

async function api(path, method="GET", body){
  const opt={method, headers:headers()};
  if(body!==undefined) opt.body=JSON.stringify(body);
  const r=await fetch(API+path, opt);
  if(r.status===401){ localStorage.removeItem("hobby_token"); token=""; showLogin(); return null; }
  if(!r.ok) return null;
  return r.status===204?{}:await r.json();
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1800); }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function showLogin(){
  document.getElementById("login").style.display="flex";
  document.getElementById("shell").style.display="none";
  document.getElementById("bottomnav").style.display="none";
}

async function boot(){
  if(!token){ showLogin(); return; }
  const u = await api("/me");
  if(!u){ showLogin(); return; }
  me = u;
  document.getElementById("login").style.display="none";
  document.getElementById("shell").style.display="block";
  document.getElementById("bottomnav").style.display="flex";
  go("home");
}

function setAppbar(mode){
  const bar=document.getElementById("appbar");
  if(mode==="main"){
    bar.className="appbar";

function showOnly(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on")); document.getElementById(id).classList.add("on"); window.scrollTo(0,0); }

function go(tab){
  curTab=tab;
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.getElementById("scr-"+tab).classList.add("on");
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on", t.dataset.tab===tab));
  window.scrollTo(0,0);
  if(tab==="home"){ setAppbar("main"); renderHome(); }
  else if(tab==="diag"){ setAppbar("새로운 취미 찾기"); renderDiagIntro(); }

async function startDiag(){

function renderSay(text, firstInput){
  const el=document.getElementById("scr-diag");
  let h=`<div class="qwrap"><div class="bubble">${esc(text)}</div>`;
  if(firstInput){
    h+=`<div class="input-row"><input id="firstIn" placeholder="편하게 한두 문장 들려주세요…" onkeydown="if(event.key==='Enter')sendFirst()"/>`+
       `<button class="btn" style="width:auto;padding:0 18px;min-height:auto" onclick="sendFirst()">보내기</button></div>`;
  }else{
    // 에이전트가 대화형으로 답한 경우 — 이어서 자유롭게 말하거나 질문으로 진행
    h+=`<div class="input-row"><input id="qFree" placeholder="편하게 이어서 이야기해요…" onkeydown="if(event.key==='Enter')sendFree()"/>`+
       `<button class="btn ghost" style="width:auto;padding:0 16px;min-height:auto" onclick="sendFree()">보내기</button></div>`+
       `<button class="btn" style="margin-top:10px" onclick="continueDiag()">다음 질문으로</button>`;
  }
  h+=`</div>`; el.innerHTML=h;
  const i=document.getElementById("firstIn"); if(i) i.focus();
}
function loadingDiag(){ document.getElementById("scr-diag").innerHTML=`<div class="typing" style="margin-top:60px"><span></span><span></span><span></span></div>`; }
async function sendFirst(){
  const inp=document.getElementById("firstIn"); const t=(inp.value||"").trim(); if(!t) return;
  loadingDiag();
  const m=await api("/message","POST",{session_id:sessionId, text:t});
  if(m) route(m.message);
}
async function continueDiag(){
  loadingDiag();
  const m=await api("/message","POST",{session_id:sessionId, text:"리포트로 정리해줘"});
  if(m) route(m.message);
}
function route(msg){
  if(msg.type==="say") renderSay(msg.text, false);
  else if(msg.type==="ask") renderQuestion(msg);
  else if(msg.type==="report") renderReport(msg.report);
}
const OPT_ICONS=["self_improvement","directions_walk","groups","favorite","bolt","spa","brush","hiking"];
function renderQuestion(msg){
  const el=document.getElementById("scr-diag"); sel=new Set();
  const opts=msg.options||[]; const n=opts.length; qCount++;
  let h=`<div class="qwrap">`;
  h+=`<div class="dots">`+Array.from({length:5},(_,i)=>`<i class="${i<Math.min(qCount,5)?'on':''}"></i>`).join("")+`</div>`;
  h+=`<div class="q-title">${esc(msg.text)}</div>`;
  h+=`<div class="q-sub">가장 마음이 끌리는 걸 모두 골라주세요 (중복 가능)</div>`;
  opts.forEach((o,i)=>{
    h+=`<button class="opt" data-i="${i}" onclick="toggleOpt(this)">`+
       `<span class="oi material-symbols-outlined">${OPT_ICONS[i%OPT_ICONS.length]}</span>`+
       `<span class="ot">${esc(o)}</span></button>`;
  });
  h+=`<button class="btn" id="nextBtn" disabled onclick='submitQ(${JSON.stringify(opts)},${n})'>다음</button>`;
  // 기타 · 직접 입력 (툴 강제 해소 — 자유롭게 말하면 에이전트가 대화/맞춤 제안)
  h+=`<div style="text-align:center;color:var(--outline-s);font-size:12px;margin:16px 0 8px">— 또는 —</div>`+
     `<div class="input-row"><input id="qFree" placeholder="기타 · 직접 이야기하기 (예: 사진에 관심 있어요)" onkeydown="if(event.key==='Enter')sendFree()"/>`+
     `<button class="btn ghost" style="width:auto;padding:0 16px;min-height:auto" onclick="sendFree()">보내기</button></div>`;
  h+=`</div>`;
  el.innerHTML=h;
}
async function sendFree(){
  const inp=document.getElementById("qFree"); const t=(inp&&inp.value||"").trim(); if(!t) return;
  loadingDiag();
  const m=await api("/message","POST",{session_id:sessionId, text:t});
  if(m) route(m.message);
}
function toggleOpt(btn){
  const i=+btn.dataset.i;
  if(sel.has(i)){ sel.delete(i); btn.classList.remove("sel"); } else { sel.add(i); btn.classList.add("sel"); }
  document.getElementById("nextBtn").disabled = sel.size===0;
}
async function submitQ(opts,n){
  if(sel.size===0) return;
  const idxs=[...sel].sort((a,b)=>a-b); const labels=idxs.map(i=>opts[i]).join(", ");
  loadingDiag();
  const m=await api("/message","POST",{session_id:sessionId, text:labels, choice_indices:idxs, n_options:n});
  if(m) route(m.message);
}

    `<div class="item"><div class="thumb sm" style="cursor:pointer" onclick="openHobby('${it.id}',null,()=>go('library'))">${it.emoji||DNA_EMOJI[it.id]||'🎯'}</div><div style="flex:1">`+
    `<h4 style="cursor:pointer" onclick="openHobby('${it.id}',null,()=>go('library'))">${esc(it.name)}</h4><p class="meta">📅 ${esc(it.saved_at)} 저장 · ${esc(it.category_label||'')}</p>`+
    `<div class="chips" style="margin-top:6px">`+["관심 있음","준비 중","완료"].map(s=>
        `<button class="chip ${it.status===s?'sel':''}" style="padding:5px 10px;font-size:12px" onclick="setStatus('${it.id}','${s}')">${s}</button>`).join("")+`</div>`+
    `</div><button class="material-symbols-outlined" style="background:none;border:none;color:var(--outline-s);cursor:pointer" onclick="removeSaved('${it.id}')">delete</button></div>`
  ).join("");
  el.innerHTML=h;
}
function setFilter(f){ libFilter=f; renderLibrary(); }
async function setStatus(id,s){ await api("/library","PATCH",{hobby_id:id,status:s}); toast("상태를 바꿨어요"); renderLibrary(); }
async function removeSaved(id){ await api("/library/"+id,"DELETE"); toast("보관함에서 뺐어요"); renderLibrary(); }

/* ── 설정 ── */
function renderSettings(){
  const el=document.getElementById("scr-settings");
  const av=me.picture?`<img src="${me.picture}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`:(me.name||"?").slice(0,1);
  el.innerHTML=`<div class="card" style="display:flex;align-items:center;gap:14px;margin-top:16px">`+
    `<div class="avatar" style="width:52px;height:52px;font-size:20px">${av}</div>`+
    `<div><div class="h-md">${esc(me.name||"친구")}</div><div class="muted" style="font-size:13px">${esc(me.email||"")}</div></div></div>`+
    `<div class="sec-title"><span class="h-md">앱 정보</span></div>`+
    `<div class="card"><p class="muted" style="margin:0;font-size:13.5px;line-height:1.7">하비DNA · 취미 발굴 MVP<br/>테마: Discovery Harmony (라이트)<br/>데이터: 로컬 저장(SQLite)</p></div>`+
    `<button class="btn outline" style="margin-top:18px" onclick="logout()">로그아웃</button>`;
}
function logout(){ localStorage.removeItem("hobby_token"); token=""; sessionId=null; showLogin(); }

boot();
</script>
